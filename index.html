  <!-- Preloader -->
  <div id="preloader">
    <div id="status">&nbsp;</div>
  </div>

  <div id="root"></div>
  <script src="/assets/js/index.bundle.js"></script>
  <script src="/assets/vendor/katex-0.7.1/katex.min.js"></script>
  <script src="/assets/vendor/katex-0.7.1/contrib/auto-render.min.js"></script>
  <script type="text/javascript">
    renderMathInElement(document.getElementById('root'), {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '\\[', right: '\\]', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: false,
      macros: {
        '\\eps': '\\varepsilon',
        '\\nnz': '{\\mathsf{nnz}}',
        '\\poly': '{\\mathrm{poly}}',
        '\\Var': '\\operatorname{Var}',
        '\\tr': '\\operatorname{tr}'
      }
    });
  </script>

  <!-- Preloader -->
  <script type="text/javascript">
    window.addEventListener('load', function() {
      var status = document.getElementById('status');
      var preloader = document.getElementById('preloader');

      if (status) {
        status.classList.add('status-hidden');
      }

      window.setTimeout(function() {
        if (preloader) {
          preloader.classList.add('preloader-hidden');
          window.setTimeout(function() {
            preloader.style.display = 'none';
          }, 600);
        }

        document.body.style.overflow = 'visible';
      }, 350);
    });
  </script>
